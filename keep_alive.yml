    - cron: '0 0 * * *' # 每天凌晨 0 点运行一次（UTC 时间）
  workflow_dispatch: # 允许你手动点击按钮测试

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -i -X GET "https://vnmolqkjfixoktvrddma.supabase.co/rest/v1/messages?select=id&limit=1" \
          -H "apikey: sb_publishable_gDv-OZwsV3lUnRMvrZ-GGA_LaiiVXFF" \
          -H "Authorization: Bearer sb_publishable_gDv-OZwsV3lUnRMvrZ-GGA_LaiiVXFF"
